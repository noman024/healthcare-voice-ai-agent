[tool.ruff]
target-version = "py311"
line-length = 100
src = ["app", "scripts", "tests"]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "F",   # Pyflakes
  "I",   # isort
  "UP",  # pyupgrade
  "B",   # bugbear
]
ignore = [
  "E501",  # line length handled by formatter preference
  "B008",  # FastAPI uses File(...)/Form(...) in defaults by design
]

[tool.ruff.lint.per-file-ignores]
"scripts/run_voice_worker.py" = ["E402"]

[tool.ruff.lint.isort]
known-first-party = ["app"]
